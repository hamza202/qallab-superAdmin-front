<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Dashboard</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,300;1,400;1,500;1,600;1,700;1,800&family=Cairo:wght@200..1000&display=swap"
      rel="stylesheet"
    />
    <script>
      // Set initial language and direction from localStorage before app loads
      (function() {
        try {
          const stored = localStorage.getItem('qallab_locale');
          const locale = (stored === 'ar' || stored === 'en') ? stored : (navigator.language.toLowerCase().startsWith('ar') ? 'ar' : 'en');
          document.documentElement.lang = locale;
          document.documentElement.dir = locale === 'ar' ? 'rtl' : 'ltr';
        } catch (e) {
          console.error('Failed to set initial locale:', e);
        }
      })();
    </script>
  </head>
  <body>
    <div id="app"></div>
    <div id="toast-container"></div>
    <!-- High z-index portal for custom dropdowns/overlays (above v-main + toast) -->
    <div id="global-overlays"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
